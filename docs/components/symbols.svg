<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- ============================================================
       SPICE-RS Component Symbol Library
       All symbols use currentColor for strokes so CSS can theme them.
       Terminals sit at exact viewBox edges for easy wiring.
       ============================================================ -->

  <!-- RESISTOR — US zigzag, 4 peaks
       viewBox 60 wide x 24 tall; terminals at (0,12) and (60,12) -->
  <symbol id="resistor" viewBox="0 0 60 24">
    <polyline fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
      points="0,12 8,12 12,2 20,22 28,2 36,22 44,2 48,12 60,12"/>
  </symbol>

  <!-- CAPACITOR — Two parallel plates with gap
       viewBox 40 wide x 24 tall; terminals at (0,12) and (40,12) -->
  <symbol id="capacitor" viewBox="0 0 40 24">
    <line x1="0" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="1.8"/>
    <line x1="16" y1="2" x2="16" y2="22" stroke="currentColor" stroke-width="1.8"/>
    <line x1="24" y1="2" x2="24" y2="22" stroke="currentColor" stroke-width="1.8"/>
    <line x1="24" y1="12" x2="40" y2="12" stroke="currentColor" stroke-width="1.8"/>
  </symbol>

  <!-- INDUCTOR — 4 coil bumps
       viewBox 60 wide x 20 tall; terminals at (0,16) and (60,16) -->
  <symbol id="inductor" viewBox="0 0 60 20">
    <line x1="0" y1="16" x2="6" y2="16" stroke="currentColor" stroke-width="1.8"/>
    <path d="M6,16 A6,6 0 0,1 18,16 A6,6 0 0,1 30,16 A6,6 0 0,1 42,16 A6,6 0 0,1 54,16"
      fill="none" stroke="currentColor" stroke-width="1.8"/>
    <line x1="54" y1="16" x2="60" y2="16" stroke="currentColor" stroke-width="1.8"/>
  </symbol>

  <!-- VOLTAGE SOURCE — Circle with + and -, terminals top/bottom
       viewBox 40 wide x 60 tall; terminals at (20,0) and (20,60) -->
  <symbol id="voltage-source" viewBox="0 0 40 60">
    <line x1="20" y1="0" x2="20" y2="10" stroke="currentColor" stroke-width="1.8"/>
    <circle cx="20" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <line x1="20" y1="50" x2="20" y2="60" stroke="currentColor" stroke-width="1.8"/>
    <!-- + near top, - near bottom -->
    <line x1="16" y1="20" x2="24" y2="20" stroke="currentColor" stroke-width="1.5"/>
    <line x1="20" y1="16" x2="20" y2="24" stroke="currentColor" stroke-width="1.5"/>
    <line x1="16" y1="40" x2="24" y2="40" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- CURRENT SOURCE — Circle with arrow inside, terminals top/bottom
       viewBox 40 wide x 60 tall; terminals at (20,0) and (20,60) -->
  <symbol id="current-source" viewBox="0 0 40 60">
    <line x1="20" y1="0" x2="20" y2="10" stroke="currentColor" stroke-width="1.8"/>
    <circle cx="20" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="1.8"/>
    <line x1="20" y1="50" x2="20" y2="60" stroke="currentColor" stroke-width="1.8"/>
    <!-- Arrow pointing up inside circle -->
    <line x1="20" y1="42" x2="20" y2="18" stroke="currentColor" stroke-width="1.8"/>
    <polyline fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
      points="15,24 20,18 25,24"/>
  </symbol>

  <!-- DIODE — Triangle pointing right with vertical bar
       viewBox 40 wide x 24 tall; terminals at (0,12) and (40,12) -->
  <symbol id="diode" viewBox="0 0 40 24">
    <line x1="0" y1="12" x2="12" y2="12" stroke="currentColor" stroke-width="1.8"/>
    <polygon points="12,2 28,12 12,22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    <line x1="28" y1="2" x2="28" y2="22" stroke="currentColor" stroke-width="1.8"/>
    <line x1="28" y1="12" x2="40" y2="12" stroke="currentColor" stroke-width="1.8"/>
  </symbol>

  <!-- NMOS — Gate left, drain top, source bottom
       viewBox 44 wide x 60 tall
       Terminals: gate at (0,30), drain at (34,0), source at (34,60) -->
  <symbol id="nmos" viewBox="0 0 44 60">
    <!-- Gate lead -->
    <line x1="0" y1="30" x2="14" y2="30" stroke="currentColor" stroke-width="1.8"/>
    <!-- Gate vertical bar -->
    <line x1="14" y1="14" x2="14" y2="46" stroke="currentColor" stroke-width="1.8"/>
    <!-- Body/channel line -->
    <line x1="20" y1="14" x2="20" y2="46" stroke="currentColor" stroke-width="1.8"/>
    <!-- Drain stub -->
    <line x1="20" y1="18" x2="34" y2="18" stroke="currentColor" stroke-width="1.8"/>
    <line x1="34" y1="0" x2="34" y2="18" stroke="currentColor" stroke-width="1.8"/>
    <!-- Source stub -->
    <line x1="20" y1="42" x2="34" y2="42" stroke="currentColor" stroke-width="1.8"/>
    <line x1="34" y1="42" x2="34" y2="60" stroke="currentColor" stroke-width="1.8"/>
    <!-- Body connection / arrow on source (pointing inward toward channel) -->
    <line x1="20" y1="30" x2="34" y2="30" stroke="currentColor" stroke-width="1.8"/>
    <polyline fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      points="26,26 30,30 26,34"/>
  </symbol>

  <!-- PMOS — Like nmos but with bubble on gate
       viewBox 48 wide x 60 tall
       Terminals: gate at (0,30), drain at (38,0), source at (38,60) -->
  <symbol id="pmos" viewBox="0 0 48 60">
    <!-- Gate lead -->
    <line x1="0" y1="30" x2="12" y2="30" stroke="currentColor" stroke-width="1.8"/>
    <!-- Gate bubble -->
    <circle cx="15" cy="30" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
    <!-- Gate vertical bar -->
    <line x1="18" y1="14" x2="18" y2="46" stroke="currentColor" stroke-width="1.8"/>
    <!-- Body/channel line -->
    <line x1="24" y1="14" x2="24" y2="46" stroke="currentColor" stroke-width="1.8"/>
    <!-- Drain stub -->
    <line x1="24" y1="18" x2="38" y2="18" stroke="currentColor" stroke-width="1.8"/>
    <line x1="38" y1="0" x2="38" y2="18" stroke="currentColor" stroke-width="1.8"/>
    <!-- Source stub -->
    <line x1="24" y1="42" x2="38" y2="42" stroke="currentColor" stroke-width="1.8"/>
    <line x1="38" y1="42" x2="38" y2="60" stroke="currentColor" stroke-width="1.8"/>
    <!-- Body connection / arrow on source (pointing outward from channel) -->
    <line x1="24" y1="30" x2="38" y2="30" stroke="currentColor" stroke-width="1.8"/>
    <polyline fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      points="32,26 28,30 32,34"/>
  </symbol>

  <!-- NPN BJT — Arrow on emitter pointing out
       viewBox 44 wide x 60 tall
       Terminals: base at (0,30), collector at (34,0), emitter at (34,60) -->
  <symbol id="npn" viewBox="0 0 44 60">
    <!-- Base lead -->
    <line x1="0" y1="30" x2="16" y2="30" stroke="currentColor" stroke-width="1.8"/>
    <!-- Base vertical bar -->
    <line x1="16" y1="14" x2="16" y2="46" stroke="currentColor" stroke-width="1.8"/>
    <!-- Collector -->
    <line x1="16" y1="20" x2="34" y2="6" stroke="currentColor" stroke-width="1.8"/>
    <line x1="34" y1="0" x2="34" y2="6" stroke="currentColor" stroke-width="1.8"/>
    <!-- Emitter with arrow pointing outward -->
    <line x1="16" y1="40" x2="34" y2="54" stroke="currentColor" stroke-width="1.8"/>
    <line x1="34" y1="54" x2="34" y2="60" stroke="currentColor" stroke-width="1.8"/>
    <!-- Arrow head on emitter -->
    <polyline fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      points="26,52 34,54 30,46"/>
  </symbol>

  <!-- PNP BJT — Arrow on emitter pointing in
       viewBox 44 wide x 60 tall
       Terminals: base at (0,30), collector at (34,60), emitter at (34,0) -->
  <symbol id="pnp" viewBox="0 0 44 60">
    <!-- Base lead -->
    <line x1="0" y1="30" x2="16" y2="30" stroke="currentColor" stroke-width="1.8"/>
    <!-- Base vertical bar -->
    <line x1="16" y1="14" x2="16" y2="46" stroke="currentColor" stroke-width="1.8"/>
    <!-- Emitter (top) with arrow pointing inward toward base -->
    <line x1="16" y1="20" x2="34" y2="6" stroke="currentColor" stroke-width="1.8"/>
    <line x1="34" y1="0" x2="34" y2="6" stroke="currentColor" stroke-width="1.8"/>
    <!-- Arrow head on emitter pointing toward base -->
    <polyline fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      points="24,8 16,20 22,16"/>
    <!-- Collector (bottom) -->
    <line x1="16" y1="40" x2="34" y2="54" stroke="currentColor" stroke-width="1.8"/>
    <line x1="34" y1="54" x2="34" y2="60" stroke="currentColor" stroke-width="1.8"/>
  </symbol>

  <!-- GROUND — Three horizontal lines decreasing in width
       viewBox 24 wide x 20 tall; terminal at (12,0) -->
  <symbol id="ground" viewBox="0 0 24 20">
    <line x1="12" y1="0" x2="12" y2="6" stroke="currentColor" stroke-width="1.8"/>
    <line x1="2" y1="6" x2="22" y2="6" stroke="currentColor" stroke-width="1.8"/>
    <line x1="5" y1="11" x2="19" y2="11" stroke="currentColor" stroke-width="1.8"/>
    <line x1="8" y1="16" x2="16" y2="16" stroke="currentColor" stroke-width="1.8"/>
  </symbol>

  <!-- NODE DOT — Filled circle, 3px radius
       viewBox 8x8; center at (4,4) -->
  <symbol id="node-dot" viewBox="0 0 8 8">
    <circle cx="4" cy="4" r="3" fill="currentColor" stroke="none"/>
  </symbol>

</svg>
