<svg xmlns="http://www.w3.org/2000/svg" width="438" height="350" viewBox="0 0 250 200">
  <style>
    text { font-family: 'Crimson Pro', Georgia, serif; font-size: 11px; }
    .label { fill: #6b5d4d; }
    .annotation { fill: #4a6fa5; }
    .wire { stroke: #3b2f20; stroke-width: 1.5; fill: none; }
    .component { stroke: #b87333; stroke-width: 1.8; fill: none; }
    .cap { stroke: #4a6fa5; stroke-width: 1.2; fill: none; }
  </style>

  <!-- MOSFET Symbol (centered) -->
  <!-- Gate bar -->
  <line x1="80" y1="55" x2="80" y2="145" class="component"/>

  <!-- Channel segments -->
  <line x1="90" y1="60" x2="90" y2="78" class="component"/>
  <line x1="90" y1="85" x2="90" y2="95" class="component"/>
  <line x1="90" y1="102" x2="90" y2="140" class="component"/>

  <!-- Gate wire -->
  <line x1="30" y1="100" x2="80" y2="100" class="wire"/>
  <text x="22" y="104" text-anchor="end" class="label" font-size="12">G</text>

  <!-- Drain wire -->
  <line x1="90" y1="60" x2="120" y2="60" class="wire"/>
  <line x1="120" y1="30" x2="120" y2="60" class="wire"/>
  <text x="127" y="35" class="label" font-size="12">D</text>

  <!-- Source wire -->
  <line x1="90" y1="140" x2="120" y2="140" class="wire"/>
  <line x1="120" y1="140" x2="120" y2="170" class="wire"/>
  <text x="127" y="170" class="label" font-size="12">S</text>

  <!-- Arrow on source -->
  <polygon points="90,140 100,136 100,144" fill="#b87333"/>

  <!-- Bulk wire -->
  <line x1="90" y1="100" x2="120" y2="100" class="wire"/>
  <line x1="120" y1="100" x2="155" y2="100" class="wire"/>
  <text x="160" y="104" class="label" font-size="12">B</text>

  <!-- === CGD capacitor (Gate to Drain) === -->
  <!-- Small cap symbol between gate and drain -->
  <line x1="50" y1="100" x2="50" y2="58" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="50" y1="58" x2="90" y2="58" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <!-- Cap plates -->
  <line x1="46" y1="82" x2="54" y2="82" class="cap" stroke-width="1.5"/>
  <line x1="46" y1="77" x2="54" y2="77" class="cap" stroke-width="1.5"/>
  <text x="36" y="82" text-anchor="end" class="annotation" font-size="10">C_GD</text>

  <!-- === CGS capacitor (Gate to Source) === -->
  <line x1="50" y1="100" x2="50" y2="142" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="50" y1="142" x2="90" y2="142" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <!-- Cap plates -->
  <line x1="46" y1="118" x2="54" y2="118" class="cap" stroke-width="1.5"/>
  <line x1="46" y1="123" x2="54" y2="123" class="cap" stroke-width="1.5"/>
  <text x="36" y="123" text-anchor="end" class="annotation" font-size="10">C_GS</text>

  <!-- === CGB capacitor (Gate to Bulk) === -->
  <line x1="42" y1="100" x2="42" y2="165" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="42" y1="165" x2="155" y2="165" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="155" y1="165" x2="155" y2="100" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <!-- Cap plates (on left vertical segment) -->
  <line x1="38" y1="138" x2="46" y2="138" class="cap" stroke-width="1.5"/>
  <line x1="38" y1="143" x2="46" y2="143" class="cap" stroke-width="1.5"/>
  <text x="28" y="143" text-anchor="end" class="annotation" font-size="10">C_GB</text>

  <!-- === CBD capacitor (Bulk to Drain) === -->
  <line x1="155" y1="100" x2="190" y2="100" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="190" y1="100" x2="190" y2="32" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="190" y1="32" x2="120" y2="32" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <!-- Cap plates -->
  <line x1="186" y1="68" x2="194" y2="68" class="cap" stroke-width="1.5"/>
  <line x1="186" y1="63" x2="194" y2="63" class="cap" stroke-width="1.5"/>
  <text x="202" y="68" class="annotation" font-size="10">C_BD</text>

  <!-- === CBS capacitor (Bulk to Source) === -->
  <line x1="155" y1="100" x2="190" y2="100" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="190" y1="100" x2="190" y2="168" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <line x1="190" y1="168" x2="120" y2="168" class="wire" stroke-width="0.8" stroke="#4a6fa5"/>
  <!-- Cap plates -->
  <line x1="186" y1="132" x2="194" y2="132" class="cap" stroke-width="1.5"/>
  <line x1="186" y1="137" x2="194" y2="137" class="cap" stroke-width="1.5"/>
  <text x="202" y="137" class="annotation" font-size="10">C_BS</text>

  <!-- Title -->
  <text x="125" y="195" text-anchor="middle" class="annotation" font-size="11">MOSFET Intrinsic Capacitances</text>
</svg>