<svg xmlns="http://www.w3.org/2000/svg" width="438" height="210" viewBox="0 0 250 120">
  <style>
    text { font-family: 'Crimson Pro', Georgia, serif; font-size: 11px; }
    .label { fill: #6b5d4d; }
    .annotation { fill: #4a6fa5; }
    .wire { stroke: #3b2f20; stroke-width: 1.5; fill: none; }
    .component { stroke: #b87333; stroke-width: 1.8; fill: none; }
  </style>

  <!-- Terminal labels -->
  <text x="8" y="58" text-anchor="end" class="label" font-size="12">A</text>
  <text x="242" y="58" class="label" font-size="12">K</text>

  <!-- Anode wire -->
  <line x1="15" y1="55" x2="60" y2="55" class="wire"/>
  <!-- Junction at anode node -->
  <circle cx="60" cy="55" r="2" fill="#3b2f20"/>

  <!-- Cathode wire -->
  <line x1="190" y1="55" x2="235" y2="55" class="wire"/>
  <!-- Junction at cathode node -->
  <circle cx="190" cy="55" r="2" fill="#3b2f20"/>

  <!-- Top branch: gd (conductance as resistor) -->
  <line x1="60" y1="55" x2="60" y2="30" class="wire"/>
  <line x1="60" y1="30" x2="92" y2="30" class="wire"/>
  <!-- Resistor zigzag -->
  <polyline points="92,30 97,23 105,37 113,23 121,37 129,23 137,37 142,30" class="component"/>
  <line x1="142" y1="30" x2="190" y2="30" class="wire"/>
  <line x1="190" y1="30" x2="190" y2="55" class="wire"/>
  <!-- Label -->
  <text x="117" y="18" text-anchor="middle" class="annotation">g_d</text>

  <!-- Bottom branch: Cd (capacitance) -->
  <line x1="60" y1="55" x2="60" y2="80" class="wire"/>
  <line x1="60" y1="80" x2="115" y2="80" class="wire"/>
  <!-- Cap plates (vertical, side by side) -->
  <line x1="115" y1="73" x2="115" y2="87" class="component" stroke-width="1.5"/>
  <line x1="121" y1="73" x2="121" y2="87" class="component" stroke-width="1.5"/>
  <line x1="121" y1="80" x2="190" y2="80" class="wire"/>
  <line x1="190" y1="80" x2="190" y2="55" class="wire"/>
  <!-- Label -->
  <text x="118" y="100" text-anchor="middle" class="annotation">C_d</text>

  <!-- Annotation formulas -->
  <text x="45" y="110" class="label" font-size="9">g_d = dI/dV</text>
  <text x="145" y="110" class="label" font-size="9">C_d = C_j + C_diff</text>
</svg>