<svg xmlns="http://www.w3.org/2000/svg" width="525" height="263" viewBox="0 0 300 150">
  <style>
    text { font-family: 'Crimson Pro', Georgia, serif; font-size: 12px; }
    .label { fill: #6b5d4d; }
    .annotation { fill: #4a6fa5; }
    .wire { stroke: #3b2f20; stroke-width: 1.5; fill: none; }
    .component { stroke: #b87333; stroke-width: 1.8; fill: none; }
  </style>

  <!-- ====== NPN ====== -->
  <text x="80" y="14" text-anchor="middle" class="annotation" font-size="13">NPN</text>

  <!-- Base vertical bar -->
  <line x1="70" y1="45" x2="70" y2="105" class="component"/>

  <!-- Base wire -->
  <line x1="25" y1="75" x2="70" y2="75" class="wire"/>
  <text x="18" y="79" text-anchor="end" class="label">B</text>

  <!-- Collector leg (angled up-right from bar) -->
  <line x1="70" y1="55" x2="110" y2="30" class="wire"/>
  <line x1="110" y1="15" x2="110" y2="30" class="wire"/>
  <text x="117" y="20" class="label">C</text>

  <!-- Emitter leg (angled down-right from bar) -->
  <line x1="70" y1="95" x2="110" y2="120" class="wire"/>
  <line x1="110" y1="120" x2="110" y2="135" class="wire"/>
  <text x="117" y="135" class="label">E</text>

  <!-- NPN arrow on emitter (pointing outward, away from base) -->
  <polygon points="95,112 85,106 91,116" fill="#b87333" stroke="none"/>


  <!-- ====== PNP ====== -->
  <text x="220" y="14" text-anchor="middle" class="annotation" font-size="13">PNP</text>

  <!-- Base vertical bar -->
  <line x1="210" y1="45" x2="210" y2="105" class="component"/>

  <!-- Base wire -->
  <line x1="165" y1="75" x2="210" y2="75" class="wire"/>
  <text x="158" y="79" text-anchor="end" class="label">B</text>

  <!-- Collector leg (angled up-right from bar) -->
  <line x1="210" y1="55" x2="250" y2="30" class="wire"/>
  <line x1="250" y1="15" x2="250" y2="30" class="wire"/>
  <text x="257" y="20" class="label">C</text>

  <!-- Emitter leg (angled down-right from bar) -->
  <line x1="210" y1="95" x2="250" y2="120" class="wire"/>
  <line x1="250" y1="120" x2="250" y2="135" class="wire"/>
  <text x="257" y="135" class="label">E</text>

  <!-- PNP arrow on emitter (pointing inward, toward base) -->
  <polygon points="215,98 225,92 219,102" fill="#b87333" stroke="none"/>
</svg>