<svg xmlns="http://www.w3.org/2000/svg" width="613" height="350" viewBox="0 0 350 200">
  <style>
    text { font-family: 'Crimson Pro', Georgia, serif; font-size: 11px; }
    .label { fill: #6b5d4d; }
    .annotation { fill: #4a6fa5; }
    .wire { stroke: #3b2f20; stroke-width: 1.5; fill: none; }
    .component { stroke: #b87333; stroke-width: 1.8; fill: none; }
  </style>

  <!-- Intrinsic BJT (center) -->
  <!-- Base vertical bar -->
  <line x1="170" y1="70" x2="170" y2="130" class="component"/>

  <!-- Collector leg -->
  <line x1="170" y1="80" x2="200" y2="60" class="wire"/>

  <!-- Emitter leg -->
  <line x1="170" y1="120" x2="200" y2="140" class="wire"/>

  <!-- NPN arrow -->
  <polygon points="190,133 182,128 186,138" fill="#b87333" stroke="none"/>

  <!-- Intrinsic label -->
  <text x="175" y="105" class="annotation" font-size="10">Intrinsic</text>
  <text x="175" y="115" class="annotation" font-size="10">BJT</text>

  <!-- Dashed box around intrinsic -->
  <rect x="155" y="55" width="55" height="95" fill="none" stroke="#4a6fa5" stroke-width="0.8" stroke-dasharray="3,2" rx="4"/>


  <!-- === RB (Base Resistance) === -->
  <!-- Wire from external B to resistor -->
  <line x1="30" y1="100" x2="65" y2="100" class="wire"/>
  <text x="22" y="104" text-anchor="end" class="label" font-size="12">B</text>

  <!-- Resistor zigzag for RB -->
  <polyline points="65,100 70,93 78,107 86,93 94,107 102,93 110,107 115,100" class="component"/>

  <!-- Wire from resistor to base bar -->
  <line x1="115" y1="100" x2="170" y2="100" class="wire"/>

  <!-- RB label -->
  <text x="90" y="85" text-anchor="middle" class="annotation">R_B</text>
  <text x="90" y="115" text-anchor="middle" class="label" font-size="9">External</text>


  <!-- === RC (Collector Resistance) === -->
  <!-- Wire from collector to resistor -->
  <line x1="200" y1="60" x2="220" y2="60" class="wire"/>

  <!-- Resistor zigzag for RC (horizontal) -->
  <polyline points="220,60 225,53 233,67 241,53 249,67 257,53 265,67 270,60" class="component"/>

  <!-- Wire from resistor to external C -->
  <line x1="270" y1="60" x2="270" y2="30" class="wire"/>
  <line x1="270" y1="30" x2="320" y2="30" class="wire"/>
  <text x="328" y="34" class="label" font-size="12">C</text>

  <!-- RC label -->
  <text x="245" y="48" text-anchor="middle" class="annotation">R_C</text>
  <text x="245" y="78" text-anchor="middle" class="label" font-size="9">External</text>


  <!-- === RE (Emitter Resistance) === -->
  <!-- Wire from emitter to resistor -->
  <line x1="200" y1="140" x2="220" y2="140" class="wire"/>

  <!-- Resistor zigzag for RE (horizontal) -->
  <polyline points="220,140 225,133 233,147 241,133 249,147 257,133 265,147 270,140" class="component"/>

  <!-- Wire from resistor to external E -->
  <line x1="270" y1="140" x2="270" y2="170" class="wire"/>
  <line x1="270" y1="170" x2="320" y2="170" class="wire"/>
  <text x="328" y="174" class="label" font-size="12">E</text>

  <!-- RE label -->
  <text x="245" y="128" text-anchor="middle" class="annotation">R_E</text>
  <text x="245" y="158" text-anchor="middle" class="label" font-size="9">External</text>

  <!-- Title -->
  <text x="175" y="193" text-anchor="middle" class="annotation" font-size="11">BJT with Parasitic Series Resistances</text>
</svg>